name: 🦀 Smart Contract Task
description: Work on Soroban (Rust) smart contracts
labels: ["smart-contract", "wave-ready", "help wanted"]
body:
  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be implemented and why does it matter?
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files to Touch
      description: Which specific Rust files should the contributor work in?
      placeholder: |
        - contracts/core/src/lib.rs
        - contracts/adapters/fund-flow-monitor/src/lib.rs
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How does the contributor know when they are done?
      placeholder: |
        - [ ] Contract compiles (pnpm build:contracts)
        - [ ] Unit tests pass (cargo test)
        - [ ] No Clippy warnings (cargo clippy)
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - Easy (1–2 days)
        - Medium (2–4 days)
        - Hard (4–7 days)
    validations:
      required: true

  - type: dropdown
    id: prerequisites
    attributes:
      label: Prerequisites
      description: What does the contributor need before starting?
      options:
        - None — just clone and run cargo test
        - Requires testnet — follow CONTRIBUTING.md setup
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Maintainer Checklist
      options:
        - label: Issue is scoped to a single function or contract logic block
        - label: Issue does not conflict with any currently open PR
        - label: Acceptance criteria are testable via cargo test
